name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build, vet, fmt, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

  # Resolve the latest published haybarn release once, so the E2E job always
  # tests the current version (and we never hardcode/pin it).
  resolve-haybarn:
    name: Resolve haybarn release
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.r.outputs.release }}
    steps:
      - id: r
        run: |
          REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          echo "Latest haybarn release: $REL"
        env:
          GH_TOKEN: ${{ github.token }}

  # SQL end-to-end: run the sqllogictest suite (test/sql/*.test) against the
  # built Go worker through the real signed `vgi` community DuckDB extension via
  # a prebuilt standalone `haybarn-unittest` — no C++ build. The worker queries a
  # real cluster, so a single-node OpenSearch (Apache-2.0, security disabled for
  # the test) runs as a service container. See ci/README.md.
  integration:
    name: SQL end-to-end (haybarn)
    needs: resolve-haybarn
    runs-on: ubuntu-latest
    services:
      opensearch:
        image: opensearchproject/opensearch:2.17.0
        ports:
          - 9209:9200
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          DISABLE_INSTALL_DEMO_CONFIG: "true"
          OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -fs http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s
    env:
      VGI_ES_TEST_URL: http://127.0.0.1:9209
      VGI_ES_TEST_INDEX: vgi_es_e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build the worker
        run: go build -o vgi-elasticsearch-worker ./cmd/vgi-elasticsearch-worker

      - name: Download haybarn-unittest
        run: |
          gh release download "$HAYBARN_RELEASE" \
            --repo Query-farm-haybarn/haybarn \
            --pattern 'haybarn_unittest-linux-amd64.zip' \
            --output haybarn-unittest.zip --clobber
          mkdir -p hb && unzip -o -q haybarn-unittest.zip -d hb
        env:
          GH_TOKEN: ${{ github.token }}
          HAYBARN_RELEASE: ${{ needs.resolve-haybarn.outputs.release }}

      - name: Resolve runner + worker paths
        run: |
          # Absolute paths: run-integration.sh cd's into a staging dir before
          # invoking the runner, so relative paths would not resolve.
          UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
          chmod +x "$UNITTEST"
          echo "HAYBARN_UNITTEST=$UNITTEST" >> "$GITHUB_ENV"
          echo "VGI_ELASTICSEARCH_WORKER=$PWD/vgi-elasticsearch-worker" >> "$GITHUB_ENV"

      - name: Run extension integration suite
        run: ci/run-integration.sh
